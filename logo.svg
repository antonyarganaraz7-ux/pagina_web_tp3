  <!-- Letra inicial -->
  <text x="60" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#3498db">EA</text>
  <!-- Subtítulo -->
  <text x="60" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" letter-spacing="1">EL ALMACÉN</text>
